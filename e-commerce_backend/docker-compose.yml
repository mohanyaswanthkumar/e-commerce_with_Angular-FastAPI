version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: ecom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ecommerce_db
      MYSQL_USER: ecom_user
      MYSQL_PASSWORD: ecom_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ecom-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ecom-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-topics-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Waiting for Kafka to be ready...';
      cub kafka-ready -b kafka:29092 1 30;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic order.placed --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic order.confirmed --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic stock.updated --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic payment.events --partitions 3 --replication-factor 1;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic notification.events --partitions 3 --replication-factor 1;
      echo 'Topics created.';
      "

  app:
    build: .
    container_name: ecom-fastapi
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://ecom_user:ecom_password@mysql:3306/ecommerce_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs

  stock-consumer-worker:
    build: .
    container_name: ecom-stock-consumer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://ecom_user:ecom_password@mysql:3306/ecommerce_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    command: ["python", "-m", "app.kafka.consumer"]
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:
